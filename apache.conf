ServerName localhost

<VirtualHost *:${PORT}>
    DocumentRoot /app
    DirectoryIndex index.php

    <Directory /app>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
